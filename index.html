<!doctype html>
<html lang="en-US">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Xania Books &#8211; Stimulate Your Brain</title>
<link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
<script src="index.js" type="text/javascript" defer></script>
</head>

<body>
<div class="header">
	<div class="header-right">
		<button onclick="loadPage('pages/index.html')">Home</button>
		<button onclick="loadPage('pages/about.html')">About</button>
		<button onclick="loadPage('pages/bookshop.html')">Bookshop</button>
		<button onclick="loadPage('pages/authorpages.html')">Author pages</button>
		<button onclick="loadPage('pages/free-books.html')">Free books</button>
		<button onclick="loadPage('pages/contact.html')">Contact</button>
	</div>
</div>

<header>
<div>
<a href="index.html" title="Home" rel="home"><h3 class="header">Xania Books</h3></a>
<p>Stimulate Your Brain</p>
</div>
</header>
<div id="content"></div>
<script>
fetch("pages/index.html")
	.then(response => response.text())
	.then(data => {
		document.getElementById("content").innerHTML = data;
		});
</script>

<script>
    function loadPage(page) {
      fetch(page)
        .then(response => response.text())
        .then(data => {
          document.getElementById("content").innerHTML = data;
        })
        .catch(error => {
          document.getElementById("content").innerHTML = "<p style='color:red;'>Error loading page.</p>";
          console.error("Error:", error);
        });
    }
</script>

<footer>
<p>Stimulate Your Brain</p>
<p>All rights reserved</p>
</footer>

</body>
</html>
